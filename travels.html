---
layout: default
title: Travels
navbar_title: Travels
---

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />

<style>
  #travel-map {
    height: 600px;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.13);
  }
  .city-label {
    background: none;
    border: none;
    box-shadow: none;
  }
  .city-label-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
  }
  .city-label-inner .pin-emoji {
    font-size: 1.6rem;
    line-height: 1;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.35));
  }
  .city-label-inner .pin-name {
    margin-top: 2px;
    font-size: 0.72rem;
    font-weight: 700;
    color: #1a1a1a;
    background: rgba(255,255,255,0.88);
    border-radius: 4px;
    padding: 1px 5px;
    white-space: nowrap;
    box-shadow: 0 1px 4px rgba(0,0,0,0.18);
  }
  .popup-name {
    font-weight: 700;
    font-size: 1.05rem;
    margin-bottom: 2px;
  }
  .popup-date {
    font-size: 0.8rem;
    color: #888;
    margin-bottom: 6px;
  }
  .popup-comment {
    font-size: 0.9rem;
    color: #333;
    max-width: 220px;
  }
</style>

<!-- Travel data embedded as JSON — safe from formatters -->
<script type="application/json" id="travel-data">
[
  {% for place in site.data.travels.places %}
  {
    "name": {{ place.name | jsonify }},
    "lat": {{ place.lat }},
    "lng": {{ place.lng }},
    "date": {{ place.date | jsonify }},
    "comment": {{ place.comment | jsonify }},
    "emoji": {{ place.emoji | default: "📍" | jsonify }}
  }{% unless forloop.last %},{% endunless %}
  {% endfor %}
]
</script>

<div class="row mt-4 mb-2">
  <div class="col">
    <h2 class="mb-0">🌍 Places I've Been</h2>
    <p class="text-muted mt-1" style="font-size:0.95rem">
      {{ site.data.travels.places | size }} places visited &amp; counting…
    </p>
  </div>
</div>

<div class="row mb-5">
  <div class="col-12">
    <div id="travel-map"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script>
  var places = JSON.parse(document.getElementById('travel-data').textContent);

  var map = L.map('travel-map', {
    center: [25, 100],
    zoom: 3,
    minZoom: 1
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 18
  }).addTo(map);

  places.forEach(function(place) {
    var icon = L.divIcon({
      className: 'city-label',
      html: '<div class="city-label-inner">' +
              '<span class="pin-emoji">' + place.emoji + '</span>' +
              '<span class="pin-name">' + place.name + '</span>' +
            '</div>',
      iconAnchor: [40, 28],
      popupAnchor: [0, -32],
      iconSize: [80, 44]
    });

    L.marker([place.lat, place.lng], { icon: icon })
      .addTo(map)
      .bindPopup(
        '<div class="popup-name">' + place.emoji + ' ' + place.name + '</div>' +
        '<div class="popup-date">&#128197; ' + place.date + '</div>' +
        '<div class="popup-comment">' + place.comment + '</div>',
        { maxWidth: 260 }
      );
  });
</script>
